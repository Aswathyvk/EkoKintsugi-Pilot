<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EkoKintsugi Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<!-- ✅ Excel Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Inter; background:#f5f8fc; padding:20px; }
.btn { padding:10px; background:#1b5e48; color:white; border:none; border-radius:5px; cursor:pointer; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
</style>
</head>

<body>

<h2>Admin Panel</h2>

<!-- ✅ EXCEL UPLOAD -->
<input type="file" id="excelFile" accept=".xlsx, .xls">
<button class="btn" onclick="uploadExcel()">Upload Excel</button>

<hr>

<div id="usersGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* ✅ YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAXnKjLJm6Wb0b9MTdz-Rh2vxddl6EVsqc",
  authDomain: "ekokintsugi-pilot.firebaseapp.com",
  projectId: "ekokintsugi-pilot",
  storageBucket: "ekokintsugi-pilot.firebasestorage.app",
  messagingSenderId: "79027793730",
  appId: "1:79027793730:web:6e858a22951a2da85f22db"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   🔥 EXCEL UPLOAD FUNCTION
========================= */
window.uploadExcel = async function () {

  const file = document.getElementById("excelFile").files[0];

  if (!file) {
    alert("Select Excel file");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function (e) {

    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    for (let row of json) {

      await addDoc(collection(db, "users"), {
        name: row.Name || "",
        email: row.Email || "",
        role: row.Role || "user",
        points: Number(row.Points || 0),
        shoeId: row.ShoeId || "",
        status: "assigned"
      });

    }

    alert("✅ Excel Uploaded!");
    loadUsers();
  };

  reader.readAsArrayBuffer(file);
};


/* =========================
   🔥 LOAD USERS
========================= */
async function loadUsers() {

  const snapshot = await getDocs(collection(db, "users"));

  let html = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    html += `
      <div class="card">
        <b>${d.name}</b><br>
        ${d.email}<br>
        Shoe: ${d.shoeId}
      </div>
    `;
  });

  document.getElementById("usersGrid").innerHTML = html;
}

loadUsers();

</script>

</body>
</html>
