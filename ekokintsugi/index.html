<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EkoKintsugi · Sign in</title>
  
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Inter',system-ui;
      background:linear-gradient(145deg,#f4f8fc,#eef2f8);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-container { max-width:460px; width:100%; }

    .brand { text-align:center; margin-bottom:32px; }

    .brand-icon {
      background:linear-gradient(135deg,#1b5e48,#2c8c6b);
      width:64px;height:64px;border-radius:24px;
      display:flex;align-items:center;justify-content:center;
      margin:auto;margin-bottom:20px;
    }

    .brand-icon i { color:white;font-size:28px; }

    .brand h1 {
      font-size:1.8rem;
      background:linear-gradient(135deg,#115e4e,#2c8c6b);
      -webkit-background-clip:text;
      color:transparent;
    }

    .brand p { color:#6b7c9c;font-size:0.85rem; }

    .login-card {
      background:white;
      border-radius:30px;
      padding:35px;
      box-shadow:0 20px 40px rgba(0,0,0,0.1);
    }

    .welcome-text h2 { font-size:1.5rem; margin-bottom:8px; }
    .welcome-text p { color:#6b7c9c;font-size:0.85rem; }

    .input-group { margin-top:20px; }

    .input-label {
      font-size:0.75rem;
      font-weight:600;
      color:#5b708b;
      margin-bottom:6px;
    }

    .input-field {
      width:100%;
      padding:12px;
      border-radius:25px;
      border:1px solid #ddd;
      font-size:0.9rem;
    }

    .input-field:focus {
      outline:none;
      border-color:#2c8c6b;
    }

    .login-btn {
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:25px;
      background:#1b5e48;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    .login-btn:hover {
      background:#0e4535;
    }

    .footer-note {
      margin-top:20px;
      font-size:0.75rem;
      text-align:center;
      color:#8ca0c0;
    }
  </style>
</head>

<body>

<div class="login-container">

  <div class="brand">
    <div class="brand-icon">
      <i class="fas fa-leaf"></i>
    </div>
    <h1>EkoKintsugi</h1>
    <p>Circular economy platform · shoe lifecycle</p>
  </div>

  <div class="login-card">
    <div class="welcome-text">
      <h2>Welcome back</h2>
      <p>Sign in to access your dashboard</p>
    </div>

    <div class="input-group">
      <div class="input-label">Email</div>
      <input type="email" id="email" class="input-field" placeholder="Enter email">
    </div>

    <div class="input-group">
      <div class="input-label">Role</div>
      <select id="role" class="input-field">
        <option value="">Select Role</option>
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="footer-note">
      Circular pilot · 8 week program
    </div>
  </div>

</div>

<script>
function login() {
  const email = document.getElementById("email").value.trim();
  const role = document.getElementById("role").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  if (!role) {
    alert("Select role");
    return;
  }

  // ✅ Email format validation (NEW FIX)
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    alert("Enter valid email");
    return;
  }

  // ✅ FINAL CORRECT FLOW
  if (role === "admin") {
    window.location.href = "admin.html";
  } else {
    // user → admin → auto redirect → dashboard
    window.location.href = "admin.html?email=" + encodeURIComponent(email);
  }
}

// ✅ Enter key support (NEW UX IMPROVEMENT)
document.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
